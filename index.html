<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeetMetric</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- heading
        user
        stats -->
        <h1>LeetMetric</h1>
        <div class="user-container">
            <p>Enter You Username below</p>
            <div class="user-input-container">
                <input type="text" placeholder="Enter Your Username here " id="user-input">
                <button id="search-btn">Search</button>
            </div>

        </div>
        <div class="stats-container">
            <div class="progress">
                <div class="progress-item ">
                    <div class="easy-progress circle">
                        <span id="easy-label" data-label="Easy">
                            Easy

                        </span>
                    </div>

                </div>

                <div class="progress-item ">
                    <div class="medium-progress circle">
                        <span id="medium-label" data-label="Medium">
                            Medium

                        </span>
                    </div>
 
                </div>

                <div class="progress-item ">
                    <div class="hard-progress circle">
                        <span id="hard-label" data-label="Hard">
                            Hard

                        </span>
                    </div>

                </div>
            </div>

            <div class="stats-card">
                <!-- direclty populate card here through javascript -->
            </div>

        </div>





    </div>

    








    <script src="index.js"></script>
    
</body>
</html>
